<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - BotHost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .glass-dark { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .text-gradient { background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-field { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; }
        .input-field:focus { border-color: #22c55e; outline: none; background: rgba(255, 255, 255, 0.08); }
        .tab-active { border-bottom: 2px solid #22c55e; color: #4ade80; }
        .tab-inactive { border-bottom: 2px solid transparent; color: #9ca3af; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-gray-100 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center space-x-2">
                <div class="w-10 h-10 bg-gradient-to-br from-green-400 to-green-600 rounded-lg flex items-center justify-center">
                    <i data-lucide="bot" class="w-6 h-6 text-white"></i>
                </div>
                <span class="font-display font-bold text-2xl">BotHost</span>
            </a>
        </div>

        <!-- Auth Container -->
        <div class="glass-dark rounded-2xl p-8">
            <!-- Tabs -->
            <div class="flex mb-8 border-b border-white/10">
                <button onclick="switchTab('signup')" id="tab-signup" class="flex-1 pb-4 text-sm font-medium tab-active transition-colors">
                    Sign Up
                </button>
                <button onclick="switchTab('login')" id="tab-login" class="flex-1 pb-4 text-sm font-medium tab-inactive transition-colors">
                    Sign In
                </button>
            </div>

            <!-- Sign Up Form -->
            <form id="signup-form" class="space-y-6" onsubmit="handleSignup(event)">
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-300">Full Name</label>
                    <input type="text" id="signup-name" required class="w-full px-4 py-3 rounded-lg input-field text-white placeholder-gray-500" placeholder="John Doe">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-300">Email Address</label>
                    <input type="email" id="signup-email" required class="w-full px-4 py-3 rounded-lg input-field text-white placeholder-gray-500" placeholder="john@example.com">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-300">Password</label>
                    <input type="password" id="signup-password" required minlength="6" class="w-full px-4 py-3 rounded-lg input-field text-white placeholder-gray-500" placeholder="••••••••">
                </div>

                <div class="flex items-start space-x-3">
                    <input type="checkbox" id="terms" required class="mt-1 w-4 h-4 rounded border-gray-600 text-green-500 focus:ring-green-500 bg-[#1a1a1a]">
                    <label for="terms" class="text-sm text-gray-400">
                        I agree to the <a href="#" class="text-green-400 hover:underline">Terms of Service</a>
                    </label>
                </div>

                <button type="submit" id="signup-btn" class="w-full bg-green-500 hover:bg-green-600 text-black font-bold py-3 rounded-lg transition-all flex items-center justify-center space-x-2">
                    <span>Create Account</span>
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>

            <!-- Login Form -->
            <form id="login-form" class="space-y-6 hidden" onsubmit="handleLogin(event)">
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-300">Email Address</label>
                    <input type="email" id="login-email" required class="w-full px-4 py-3 rounded-lg input-field text-white placeholder-gray-500" placeholder="john@example.com">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-300">Password</label>
                    <input type="password" id="login-password" required class="w-full px-4 py-3 rounded-lg input-field text-white placeholder-gray-500" placeholder="••••••••">
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="w-4 h-4 rounded border-gray-600 text-green-500 focus:ring-green-500 bg-[#1a1a1a]">
                        <label for="remember" class="ml-2 text-sm text-gray-400">Remember me</label>
                    </div>
                    <a href="#" class="text-sm text-green-400 hover:underline">Forgot password?</a>
                </div>

                <button type="submit" id="login-btn" class="w-full bg-green-500 hover:bg-green-600 text-black font-bold py-3 rounded-lg transition-all flex items-center justify-center space-x-2">
                    <span>Sign In</span>
                    <i data-lucide="log-in" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 transition-transform duration-300 z-50">
        <span id="toast-message">Error</span>
    </div>

    <script>
        lucide.createIcons();

        const API_URL = ''; // Same origin

        // Check URL params
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'signup';
        
        if (mode === 'login') switchTab('login');

        function switchTab(tab) {
            const signupForm = document.getElementById('signup-form');
            const loginForm = document.getElementById('login-form');
            const signupTab = document.getElementById('tab-signup');
            const loginTab = document.getElementById('tab-login');

            if (tab === 'signup') {
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                signupTab.classList.add('tab-active');
                signupTab.classList.remove('tab-inactive');
                loginTab.classList.remove('tab-active');
                loginTab.classList.add('tab-inactive');
            } else {
                signupForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                signupTab.classList.remove('tab-active');
                signupTab.classList.add('tab-inactive');
                loginTab.classList.add('tab-active');
                loginTab.classList.remove('tab-inactive');
            }
        }

        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg transform transition-transform duration-300 z-50 ${type === 'success' ? 'bg-green-500 text-black' : 'bg-red-500 text-white'}`;
            document.getElementById('toast-message').textContent = message;
            toast.classList.remove('translate-y-20');
            setTimeout(() => toast.classList.add('translate-y-20'), 3000);
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            btn.disabled = loading;
            btn.innerHTML = loading ? '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-black"></div>' : 
                (btnId === 'signup-btn' ? '<span>Create Account</span><i data-lucide="arrow-right" class="w-5 h-5"></i>' : '<span>Sign In</span><i data-lucide="log-in" class="w-5 h-5"></i>');
            lucide.createIcons();
        }

        async function handleSignup(e) {
            e.preventDefault();
            setLoading('signup-btn', true);

            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error);

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                showToast('Account created successfully!', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 1000);
            } catch (err) {
                showToast(err.message);
                setLoading('signup-btn', false);
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            setLoading('login-btn', true);

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error);

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                showToast('Welcome back!', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 1000);
            } catch (err) {
                showToast(err.message);
                setLoading('login-btn', false);
            }
        }
    </script>
</body>
</html>
